version: '3.8'

services:
  api:
    build:
      context: ./api
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/BigPharmaDB
      - NODE_ENV=production
      - JWT_SECRET=your_super_secret_key_here
    depends_on:
      - mongodb
    networks:
      - bigpharma-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - bigpharma-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - bigpharma-network

networks:
  bigpharma-network:
    driver: bridge

volumes:
  mongodb_data:
