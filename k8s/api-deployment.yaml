apiVersion: apps/v1
kind: Deployment
metadata:
  name: bigpharma-api
  labels:
    app: bigpharma-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bigpharma-api
  template:
    metadata:
      labels:
        app: bigpharma-api
    spec:
      containers:
      - name: api
        image: your-docker-hub-username/bigpharma-api:latest
        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: bigpharma-secrets
        - configMapRef:
            name: bigpharma-config
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bigpharma-api-service
spec:
  selector:
    app: bigpharma-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
