name: BigPharma CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  flutter_test:
    name: Flutter Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: flutter format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      - name: Run Tests (Unit, Widget, Golden) with Coverage
        run: flutter test --coverage

      - name: Check Coverage Threshold (80%)
        uses: VeryGoodOpenSource/very_good_coverage@v2
        with:
          path: ./client_app/coverage/lcov.info
          min_coverage: 80

  node_api_test:
    name: Node.js API Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './api/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Run Tests with Coverage
        run: npm run test:coverage

      - name: Check Coverage Threshold (80%)
        run: |
          COVERAGE=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
          echo "Current Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Error: Code coverage is below 80%"
            exit 1
          fi
